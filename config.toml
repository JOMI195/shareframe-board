debug = true
production = false
base_url = ""

[log]
log_path = "logs"

[shareframe_application]
service_name = "shareframe.service"
log_file = "shareframe-application.log"

[database]
database_path = "db"
database_name = "shareframe.db"
migrations_path = "migrations"

[auth_token]
http_fetch_token_url = "/api/frames/obtain-frame-token/"
http_verify_token_url = "/api/frames/verify-frame-auth-token/"

[websocket]
ws_path = "ws/frames/"

[image]
image_save_path = "images"

[display]
mock_display = false
interval_secs = 900
min_refresh_secs = 120
loading_image_path = "assets/image/loading"
default_images_path = "assets/image/default"
clear_target_hour = 2

[update]
http_latest_url = "/api/frame-updates/latest/"

[dashboard_application]
service_name = "shareframe-dashboard.service"
log_file = "shareframe-dashboard.log"
socket_path = "/tmp/shareframe-ipc.sock"
port = 8080
host = "0.0.0.0"
http_verify_otp_url = "/api/frames/verify-otp/"

[heartbeat_application]
service_name = "shareframe-heartbeat.service"
log_file = "shareframe-heartbeat.log"

[heartbeat]
interval_secs = 60
http_url = "/api/frames/frame-hearbeat/"

[image_check]
interval_secs = 900
