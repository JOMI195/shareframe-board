services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - node_modules:/app/frontend/node_modules
    env_file:
      - ./.env.dev
    working_dir: /app/frontend
    command: npm run dev

volumes:
  node_modules: { }
