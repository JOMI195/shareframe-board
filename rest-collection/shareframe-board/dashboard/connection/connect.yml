info:
  name: connect
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/connection/connect"
  headers:
    Cookie: "session={{sessionCookie}}"
  body:
    type: json
    data: |-
      {
        "ssid": "MyNetwork",
        "password": "MyPassword123"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
