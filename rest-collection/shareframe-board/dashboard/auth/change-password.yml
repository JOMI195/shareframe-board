info:
  name: change-password
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/change-password"
  headers:
    Cookie: "session={{sessionCookie}}"
  body:
    type: json
    data: |-
      {
        "current_password": "current",
        "new_password": "newpassword"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
