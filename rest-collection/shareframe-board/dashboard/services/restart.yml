info:
  name: restart
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/services/restart"
  headers:
    Cookie: "session={{sessionCookie}}"
  body:
    type: json
    data: |-
      {
        "service": "shareframe"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
